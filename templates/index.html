<!DOCTYPE html>
<html>
    <head>
        <title>AI Notes Summarizer</title>
    </head>
    <body>
        <h1>AI Notes Summarizer</h1>
        <form action="/summarize" method="post">
            <textarea name="text" rows="10" cols="50" placeholder="Enter your notes here..."></textarea><br><br>
            <label>Select Mode:</label>
        <select name="mode">
        <option value="summary">Summary</option>
        <option value="teacher">Explain like Friend</option>
        <option value="exam">Exam Points</option>
        </select><br><br>
            <button type="submit">Summarize</button>
    </form>
    {% if summary %}
        <h2>Summary:</h2>
        <p>{{ summary }}</p>
    {% endif %}
    </body>
</html>
